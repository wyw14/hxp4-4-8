<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHANNEL ZERO - CRT Tuner</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div class="tv-frame">
      <div class="tv-screen-container">
        <canvas id="glCanvas"></canvas>
        <div class="screen-glare"></div>
        <div class="scanlines"></div>
        <div id="signalOverlay" class="signal-overlay">
          <div class="signal-name"></div>
          <div class="signal-description"></div>
          <div class="binary-stream"></div>
        </div>
      </div>
      
      <div class="tv-body">
        <div class="brand-label">CHANNEL ZERO</div>
        
        <div class="controls-panel">
          <div class="knob-group">
            <div class="knob-label">VHF</div>
            <div class="knob" id="vhfKnob" data-param="vhf">
              <div class="knob-mark"></div>
            </div>
            <div class="knob-value" id="vhfValue">000</div>
          </div>
          
          <div class="knob-group">
            <div class="knob-label">UHF</div>
            <div class="knob" id="uhfKnob" data-param="uhf">
              <div class="knob-mark"></div>
            </div>
            <div class="knob-value" id="uhfValue">000</div>
          </div>
          
          <div class="knob-group">
            <div class="knob-label">ANTENNA</div>
            <div class="knob" id="antennaKnob" data-param="antenna">
              <div class="knob-mark"></div>
            </div>
            <div class="knob-value" id="antennaValue">000°</div>
          </div>
        </div>
        
        <div class="status-bar">
          <div class="signal-meter">
            <div class="signal-meter-label">SIGNAL</div>
            <div class="signal-meter-bar">
              <div class="signal-meter-fill" id="signalFill"></div>
            </div>
          </div>
          <div class="weather-indicator">
            <span class="weather-icon">⛈</span>
            <span class="weather-label">STORM</span>
          </div>
          <button class="power-button" id="audioToggle">
            <span class="power-icon">◉</span>
            <span class="power-label">AUDIO</span>
          </button>
        </div>
        
        <div class="instructions">
          <div>Drag knobs to tune • Scroll to fine-tune</div>
          <div id="foundCount">Signals found: 0 / 4</div>
        </div>
      </div>
    </div>

    <div class="storm-debug-panel" id="stormDebugPanel">
      <div class="debug-header">
        <span class="debug-title">⚡ STORM DEBUG</span>
        <button class="debug-toggle" id="debugToggle">−</button>
      </div>
      <div class="debug-content" id="debugContent">
        <div class="debug-slider-group">
          <div class="debug-slider-label">
            <span>漂移幅度</span>
            <span class="debug-value" id="driftValue">1.0x</span>
          </div>
          <input type="range" id="driftSlider" min="0" max="3" step="0.1" value="1" class="debug-slider">
        </div>
        <div class="debug-slider-group">
          <div class="debug-slider-label">
            <span>变化间隔</span>
            <span class="debug-value" id="intervalValue">4000ms</span>
          </div>
          <input type="range" id="intervalSlider" min="200" max="10000" step="100" value="4000" class="debug-slider">
        </div>
        <div class="debug-slider-group">
          <div class="debug-slider-label">
            <span>雨噪强度</span>
            <span class="debug-value" id="rainValue">0.60</span>
          </div>
          <input type="range" id="rainSlider" min="0" max="2" step="0.05" value="0.6" class="debug-slider">
        </div>
        <div class="debug-slider-group">
          <div class="debug-slider-label">
            <span>闪电概率</span>
            <span class="debug-value" id="lightningValue">0.003</span>
          </div>
          <input type="range" id="lightningSlider" min="0" max="0.05" step="0.001" value="0.003" class="debug-slider">
        </div>
        <div class="debug-reset">
          <button id="debugReset" class="debug-reset-btn">重置默认值</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
